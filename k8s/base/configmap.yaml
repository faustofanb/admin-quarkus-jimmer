# Application ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-app-config
  namespace: admin-system
  labels:
    app.kubernetes.io/component: config
data:
  # Quarkus 配置
  QUARKUS_PROFILE: "prod"
  QUARKUS_HTTP_HOST: "0.0.0.0"
  QUARKUS_HTTP_PORT: "8080"

  # 数据库配置 (非敏感部分)
  QUARKUS_DATASOURCE_DB_KIND: "postgresql"
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgresql:5432/admin"

  # Redis 配置
  QUARKUS_REDIS_HOSTS: "redis://redis:6379"

  # 日志配置
  QUARKUS_LOG_LEVEL: "INFO"
  QUARKUS_LOG_CONSOLE_FORMAT: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"
  QUARKUS_LOG_CONSOLE_JSON: "false"

  # 可观测性配置
  QUARKUS_MICROMETER_EXPORT_PROMETHEUS_ENABLED: "true"
  QUARKUS_HEALTH_EXTENSIONS_ENABLED: "true"

  # OpenTelemetry (可选)
  QUARKUS_OTEL_ENABLED: "false"
  # QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
