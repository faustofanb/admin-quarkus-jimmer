# Application Secrets
# 注意: 生产环境应使用 Sealed Secrets 或外部 Secret 管理器
apiVersion: v1
kind: Secret
metadata:
  name: admin-app-secret
  namespace: admin-system
  labels:
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # 数据库凭证
  QUARKUS_DATASOURCE_USERNAME: "admin"
  QUARKUS_DATASOURCE_PASSWORD: "password"

  # JWT 密钥 (生产环境请更换)
  JWT_SECRET_KEY: "your-256-bit-secret-key-here-change-in-production"

  # Redis 密码 (如果启用)
  # QUARKUS_REDIS_PASSWORD: "redis-password"

---
# PostgreSQL Secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: admin-system
  labels:
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "password"
  POSTGRES_DB: "admin"

---
# GHCR Pull Secret (用于拉取私有镜像)
# 运行 deploy-to-k3s.sh 时会自动创建
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: admin-system
type: kubernetes.io/dockerconfigjson
data:
  # 占位符，实际值由脚本生成
  # kubectl create secret docker-registry ghcr-pull-secret ...
  .dockerconfigjson: e30=
