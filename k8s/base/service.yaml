# Admin Application Services
---
# ClusterIP Service (内部访问)
apiVersion: v1
kind: Service
metadata:
  name: admin-app
  namespace: admin-system
  labels:
    app.kubernetes.io/component: application
    app.kubernetes.io/name: admin-app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: admin-app

---
# NodePort Service (开发环境直接访问)
apiVersion: v1
kind: Service
metadata:
  name: admin-app-nodeport
  namespace: admin-system
  labels:
    app.kubernetes.io/component: application
    app.kubernetes.io/name: admin-app
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
      protocol: TCP
  selector:
    app.kubernetes.io/name: admin-app

---
# Headless Service (用于 StatefulSet 或直接 Pod 访问)
apiVersion: v1
kind: Service
metadata:
  name: admin-app-headless
  namespace: admin-system
  labels:
    app.kubernetes.io/component: application
    app.kubernetes.io/name: admin-app
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: admin-app
