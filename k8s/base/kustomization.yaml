# Kustomize Base Configuration
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: admin-system

# 通用标签
commonLabels:
  app.kubernetes.io/name: admin-quarkus
  app.kubernetes.io/part-of: admin-system
  app.kubernetes.io/managed-by: kustomize

# 资源文件
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgresql.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

# 配置生成器
configMapGenerator:
  - name: admin-app-config
    behavior: merge
    literals:
      - QUARKUS_PROFILE=prod

# 镜像配置 (在 overlays 中覆盖)
images:
  - name: admin-quarkus
    newName: ghcr.io/faustofan/admin-quarkus-jimmer
    newTag: latest
