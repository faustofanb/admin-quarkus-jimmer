# Kustomize Prod Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: admin-system

# 引用基础配置
resources:
  - ../../base

# 生产环境标签
commonLabels:
  environment: prod

# 镜像覆盖 (使用语义化版本)
images:
  - name: admin-quarkus
    newName: ghcr.io/faustofan/admin-quarkus-jimmer
    newTag: latest

# 配置覆盖
patches:
  # 增加副本数
  - target:
      kind: Deployment
      name: admin-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # 增加资源限制
  - target:
      kind: Deployment
      name: admin-app
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1024Mi"

  # HPA 配置
  - target:
      kind: HorizontalPodAutoscaler
      name: admin-app-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 10

# ConfigMap 覆盖
configMapGenerator:
  - name: admin-app-config
    behavior: merge
    literals:
      - QUARKUS_PROFILE=prod
      - QUARKUS_LOG_LEVEL=INFO
      - QUARKUS_LOG_CONSOLE_JSON=true
