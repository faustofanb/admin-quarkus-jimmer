# GitHub Actions CD Pipeline
# 持续部署流水线：GitOps 风格，更新 K8s 配置触发部署

name: CD Pipeline

on:
  # CI 完成后触发
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: "Docker image tag"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== Update K8s Manifests ====================
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Determine Environment and Tag
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "image_tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Update Kustomize Image Tag
        run: |
          cd k8s/overlays/${{ steps.config.outputs.environment }}
          kustomize edit set image admin-quarkus=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.image_tag }}

          echo "Updated image to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.image_tag }}"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add k8s/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(k8s): update image tag to ${{ steps.config.outputs.image_tag }} for ${{ steps.config.outputs.environment }}"
            git push
          fi

  # ==================== Deploy to Dev (Auto) ====================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: update-manifests
    if: ${{ (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev') }}
    environment:
      name: dev
      url: https://dev.admin.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # 如果使用 Rancher，通过 Rancher API 触发部署
      # - name: Trigger Rancher Deployment
      #   run: |
      #     curl -X POST \
      #       -H "Authorization: Bearer ${{ secrets.RANCHER_API_TOKEN }}" \
      #       "${{ secrets.RANCHER_API_URL }}/v3/projects/${{ secrets.RANCHER_PROJECT_ID }}/workloads/deployment:admin-system:admin-app?action=redeploy"

      - name: Notify Deployment
        run: |
          echo "🚀 Deployed to Dev environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

  # ==================== Deploy to Staging (Manual) ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: update-manifests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' }}
    environment:
      name: staging
      url: https://staging.admin.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Notify Deployment
        run: |
          echo "🚀 Deployed to Staging environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"

  # ==================== Deploy to Prod (Manual with Approval) ====================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: update-manifests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod' }}
    environment:
      name: production
      url: https://admin.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Notify Deployment
        run: |
          echo "🚀 Deployed to Production environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"

  # ==================== Send Notification ====================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always() && (needs.deploy-dev.result == 'success' || needs.deploy-staging.result == 'success' || needs.deploy-prod.result == 'success')

    steps:
      - name: Send Slack Notification
        run: |
          echo "✅ Deployment completed successfully!"
          # 可以添加 Slack/Discord/邮件通知
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Deployment completed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
