# GitHub Actions Release Pipeline
# 发布流水线：创建 Release 时触发，构建 Native 镜像

name: Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        default: "v0.0.1"
      build_native:
        description: "Build native image"
        required: true
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: "21"

jobs:
  # ==================== Build JVM Image ====================
  build-jvm:
    name: Build JVM Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: ./mvnw package -B -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push JVM Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.quarkus
          target: jvm-runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-jvm
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Admin Quarkus Jimmer
            org.opencontainers.image.description=Admin System built with Quarkus and Jimmer
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Build Native Image (Optional) ====================
  build-native:
    name: Build Native Image
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_native == 'true' || github.event_name == 'release' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - name: Build Native Image
        run: ./mvnw package -Pnative -B -DskipTests
        env:
          MAVEN_OPTS: "-Xmx4g"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Native Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.quarkus
          target: native-runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-native
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:native
          labels: |
            org.opencontainers.image.title=Admin Quarkus Jimmer (Native)
            org.opencontainers.image.description=Admin System Native Build
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Create Release Artifacts ====================
  release-artifacts:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [build-jvm]
    if: ${{ github.event_name == 'release' }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build Uber JAR
        run: ./mvnw package -B -DskipTests -Dquarkus.package.type=uber-jar

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/*-runner.jar
            k8s/overlays/prod/kustomization.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Update Documentation ====================
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [build-jvm]
    if: ${{ github.event_name == 'release' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Update README Badge
        run: |
          echo "Release ${{ steps.version.outputs.version }} documentation update"
          # 可以添加自动更新 README 的逻辑

  # ==================== Notify Release ====================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [build-jvm, build-native, release-artifacts]
    if: always()

    steps:
      - name: Release Summary
        run: |
          echo "🎉 Release completed!"
          echo ""
          echo "Images pushed:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name || github.event.inputs.version }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          if [ "${{ needs.build-native.result }}" == "success" ]; then
            echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:native"
          fi
