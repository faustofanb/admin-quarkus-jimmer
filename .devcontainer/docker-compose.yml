version: '3.8'
services:
  # ==================== DevContainer App ====================
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/admin-quarkus-jimmer:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - k3s-kubeconfig:/root/.kube # 共享 kubeconfig
    command: sleep infinity
    environment:
      - KUBECONFIG=/root/.kube/config
    networks:
      - admin-network

  # ==================== K3s (Kubernetes) ====================
  # 轻量级 Kubernetes 集群，用于本地开发和测试
  k3s:
    image: rancher/k3s:v1.29.0-k3s1
    command:
      - server
      - --disable=traefik # 禁用默认 traefik，使用 Rancher 的
      - --tls-san=k3s
      - --tls-san=localhost
      - --tls-san=127.0.0.1
      - --write-kubeconfig-mode=644
    privileged: true
    environment:
      - K3S_TOKEN=devcontainer-token
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=644
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      - ./k3s/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
    ports:
      - "6443:6443" # Kubernetes API
      - "80:80" # Ingress HTTP
      - "443:443" # Ingress HTTPS
      - "30080:30080" # NodePort for admin-app
      - "30081:30081" # NodePort reserved
      - "30082:30082" # NodePort reserved
    networks:
      - admin-network
    healthcheck:
      test: [ "CMD", "kubectl", "get", "nodes" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==================== Rancher Server ====================
  # Kubernetes 管理平台，提供 UI 和 GitOps 功能
  rancher:
    image: rancher/rancher:v2.8-head
    privileged: true
    environment:
      - CATTLE_BOOTSTRAP_PASSWORD=admin # 初始密码，首次登录时会提示修改
      - AUDIT_LEVEL=1
    volumes:
      - rancher-data:/var/lib/rancher
    ports:
      - "8443:443" # Rancher UI (HTTPS)
      - "8080:80" # Rancher UI (HTTP redirect) - 注意与 Quarkus dev 冲突
    networks:
      - admin-network
    depends_on:
      k3s:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsk", "https://localhost/ping" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s # Rancher 启动较慢
    restart: unless-stopped
    profiles:
      - rancher # 使用 profile 控制，默认不启动

  # ==================== 开发数据库 (Docker Compose 模式) ====================
  # 注意：K8s 部署时使用 k8s/base/postgresql.yaml
  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - admin-network
    profiles:
      - dev # 仅开发模式使用，K8s 部署时不需要

  # ==================== 开发 Redis (Docker Compose 模式) ====================
  # 注意：K8s 部署时使用 k8s/base/redis.yaml
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - admin-network
    profiles:
      - dev # 仅开发模式使用，K8s 部署时不需要

  # ==================== Quarkus Application (Docker 模式) ====================
  quarkus-app:
    image: admin-quarkus:latest
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.quarkus
      target: jvm-runner
      args:
        BUILD_TYPE: jvm
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/admin
      QUARKUS_DATASOURCE_USERNAME: admin
      QUARKUS_DATASOURCE_PASSWORD: password
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      - postgresql
      - redis
    networks:
      - admin-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - deploy # 使用 profile 控制，默认不启动

  # ==================== Quarkus Dev Mode ====================
  quarkus-dev:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ..:/app:cached
      - maven-repo:/root/.m2
    ports:
      - "8082:8080"
      - "5005:5005"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/admin
      QUARKUS_DATASOURCE_USERNAME: admin
      QUARKUS_DATASOURCE_PASSWORD: password
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      MAVEN_OPTS: "-Xmx1g"
    command: [ "./mvnw", "quarkus:dev", "-Dquarkus.http.host=0.0.0.0", "-Ddebug=5005" ]
    depends_on:
      - postgresql
      - redis
    networks:
      - admin-network
    profiles:
      - dev

  # ==================== 监控服务 ====================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - admin-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - admin-network
    profiles:
      - monitoring

# ==================== Networks ====================
networks:
  admin-network:
    driver: bridge

# ==================== Volumes ====================
volumes:
  postgres-data:
  redis-data:
  maven-repo:
  k3s-server: # K3s 数据
  k3s-kubeconfig: # K3s kubeconfig 共享
  rancher-data: # Rancher 数据
  grafana-data:
  prometheus-data:
