version: '3.8'
services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity

  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ==================== Quarkus Application ====================
  # 用于打包部署测试的 Quarkus 应用容器
  # 使用方式:
  #   1. 完整构建: ./scripts/build-and-deploy.sh [jvm|native]
  #   2. 直接启动已构建的镜像: docker-compose up -d quarkus-app
  quarkus-app:
    image: admin-quarkus:latest
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.quarkus
      target: jvm-runner
      args:
        BUILD_TYPE: jvm
    restart: unless-stopped
    ports:
      - "8081:8080"  # 使用 8081 避免与 dev 模式的 8080 冲突
    environment:
      # 数据库配置
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/admin
      QUARKUS_DATASOURCE_USERNAME: admin
      QUARKUS_DATASOURCE_PASSWORD: password
      # Redis 配置
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      # OpenTelemetry 配置 (可选)
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      # 日志级别
      QUARKUS_LOG_LEVEL: INFO
      QUARKUS_LOG_CONSOLE_FORMAT: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"
      # JVM 配置
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      - postgresql
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - deploy  # 使用 profile 控制，默认不启动

  # ==================== Quarkus Dev Mode (可选) ====================
  # 热重载开发模式，挂载源代码
  quarkus-dev:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ..:/app:cached
      - maven-repo:/root/.m2
    ports:
      - "8082:8080"   # 开发模式端口
      - "5005:5005"   # 远程调试端口
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/admin
      QUARKUS_DATASOURCE_USERNAME: admin
      QUARKUS_DATASOURCE_PASSWORD: password
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      MAVEN_OPTS: "-Xmx1g"
    command: ["./mvnw", "quarkus:dev", "-Dquarkus.http.host=0.0.0.0", "-Ddebug=5005"]
    depends_on:
      - postgresql
      - redis
    profiles:
      - dev  # 使用 profile 控制，默认不启动

  # Apache Pulsar (Standalone mode with all components)
  # pulsar:
