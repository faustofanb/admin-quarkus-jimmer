# K3s Registry Configuration
# 配置 GitHub Container Registry (GHCR) 访问
# 使用前需要设置 GHCR_TOKEN 环境变量

mirrors:
  "ghcr.io":
    endpoint:
      - "https://ghcr.io"

configs:
  "ghcr.io":
    auth:
      # 使用环境变量注入认证信息
      # 在 k3s-setup.sh 中会动态替换这些值
      username: "${GHCR_USERNAME}"
      password: "${GHCR_TOKEN}"
