# Prometheus Configuration for Admin System
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Admin Quarkus Application (Docker Compose mode)
  - job_name: "admin-app-docker"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["quarkus-app:8080"]
        labels:
          deployment: "docker"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "admin-app"

  # Admin Quarkus Application (Kubernetes mode via NodePort)
  - job_name: "admin-app-k8s"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["k3s:30080"]
        labels:
          deployment: "kubernetes"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "admin-app-k8s"

  # PostgreSQL (optional - requires postgres_exporter)
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis (optional - requires redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Kubernetes API Server metrics (via K3s)
